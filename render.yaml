services:
  - type: web
    name: voice-ai-assistant
    env: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GROQ_API_KEY
        sync: false
      - key: WHISPER_MODEL
        value: base
      - key: ELEVENLABS_API_KEY
        sync: false
