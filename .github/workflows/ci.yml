name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint & import check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check . --output-format=github

      - name: Import check
        env:
          GROQ_API_KEY: dummy
          UPSTASH_REDIS_REST_URL: https://dummy.upstash.io
          UPSTASH_REDIS_REST_TOKEN: dummy
          JWT_SECRET: dummy
          FRONTEND_URL: http://localhost:8000
        run: python -c "import main"

      - name: Run tests
        env:
          GROQ_API_KEY: dummy
          UPSTASH_REDIS_REST_URL: https://dummy.upstash.io
          UPSTASH_REDIS_REST_TOKEN: dummy
          JWT_SECRET: dummy
          FRONTEND_URL: http://localhost:8000
        run: python -m pytest tests/ -v

  frontend:
    name: Frontend — HTML validity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check index.html exists and is non-empty
        run: |
          test -s frontend/index.html
          test -s docs/index.html
          echo "Frontend files present."
