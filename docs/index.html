<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARIA – Voice AI Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #e2e2e2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(10,10,15,0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .logo { font-size: 22px; font-weight: 700; color: #a78bfa; letter-spacing: 2px; }
    .tagline { font-size: 12px; color: #666; }

    .clear-btn {
      margin-left: auto;
      background: transparent;
      border: 1px solid #333;
      color: #888;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    .clear-btn:hover { border-color: #a78bfa; color: #a78bfa; }

    main {
      width: 100%;
      max-width: 700px;
      padding: 100px 20px 200px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      flex-direction: column;
      gap: 4px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .message .bubble {
      padding: 14px 18px;
      border-radius: 16px;
      max-width: 85%;
      line-height: 1.6;
      font-size: 15px;
    }

    .message.user { align-items: flex-end; }
    .message.user .bubble {
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.assistant { align-items: flex-start; }
    .message.assistant .bubble {
      background: #1a1a2e;
      border: 1px solid rgba(167,139,250,0.15);
      color: #e2e2e2;
      border-bottom-left-radius: 4px;
    }

    .role-label {
      font-size: 11px;
      color: #555;
      padding: 0 4px;
    }

    .thinking {
      display: flex;
      gap: 5px;
      padding: 14px 18px;
      background: #1a1a2e;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .thinking span {
      width: 8px; height: 8px;
      background: #a78bfa;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: scale(0.7); opacity:0.5 } 40% { transform: scale(1); opacity:1 } }

    /* Bottom bar */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 24px;
      background: linear-gradient(transparent, #0a0a0f 40%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .status-text {
      font-size: 13px;
      color: #666;
      min-height: 18px;
      transition: color 0.3s;
    }
    .status-text.active { color: #a78bfa; }

    /* Mic orb */
    .mic-orb {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.3s;
      box-shadow: 0 0 0 0 rgba(167,139,250,0.4);
      position: relative;
    }

    .mic-orb:hover { transform: scale(1.05); }
    .mic-orb.recording {
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(167,139,250,0.6); }
      70% { box-shadow: 0 0 0 20px rgba(167,139,250,0); }
      100% { box-shadow: 0 0 0 0 rgba(167,139,250,0); }
    }

    .mic-orb svg { width: 28px; height: 28px; fill: white; }

    /* Text input row */
    .text-row {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 500px;
    }
    .text-row input {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px 16px;
      color: #e2e2e2;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .text-row input:focus { border-color: #a78bfa; }
    .text-row input::placeholder { color: #444; }
    .text-row button {
      background: #7c3aed;
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      color: white;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }
    .text-row button:hover { background: #6d28d9; }

    .empty-state {
      text-align: center;
      color: #333;
      margin-top: 60px;
    }
    .empty-state .big { font-size: 64px; margin-bottom: 16px; }
    .empty-state p { font-size: 15px; line-height: 1.7; }
  </style>
</head>
<body>

<header>
  <div class="logo">ARIA</div>
  <div class="tagline">AI Real-time Intelligent Assistant</div>
  <button class="clear-btn" onclick="clearSession()">Clear chat</button>
</header>

<main id="chat">
  <div class="empty-state">
    <div class="big">🎙️</div>
    <p>Press the mic button to start talking.<br/>Type a message below if you prefer text.</p>
  </div>
</main>

<div class="bottom-bar">
  <div class="status-text" id="status">Tap the mic to speak</div>
  <button class="mic-orb" id="micBtn" onclick="toggleRecording()">
    <svg viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 0-4 4v6a4 4 0 0 0 8 0V5a4 4 0 0 0-4-4zm-1 14.93V19h-2v2h6v-2h-2v-3.07A7.002 7.002 0 0 0 19 11h-2a5 5 0 0 1-10 0H5a7.002 7.002 0 0 0 6 6.93z"/></svg>
  </button>
  <div class="text-row">
    <input type="text" id="textInput" placeholder="Or type your message…" onkeydown="if(event.key==='Enter') sendText()" />
    <button onclick="sendText()">Send</button>
  </div>
</div>

<script>
  const API = "https://aria-voice-assistant-6eze.onrender.com";
  const sessionId = "session_" + Math.random().toString(36).slice(2, 8);

  let mediaRecorder = null;
  let audioChunks = [];
  let recording = false;

  const chat = document.getElementById("chat");
  const micBtn = document.getElementById("micBtn");
  const status = document.getElementById("status");

  function setStatus(text, active = false) {
    status.textContent = text;
    status.className = "status-text" + (active ? " active" : "");
  }

  function addMessage(role, text) {
    // Remove empty state
    const empty = chat.querySelector(".empty-state");
    if (empty) empty.remove();

    const div = document.createElement("div");
    div.className = `message ${role}`;
    div.innerHTML = `
      <div class="role-label">${role === "user" ? "You" : "ARIA"}</div>
      <div class="bubble">${text}</div>
    `;
    chat.appendChild(div);
    div.scrollIntoView({ behavior: "smooth" });
    return div;
  }

  function addThinking() {
    const empty = chat.querySelector(".empty-state");
    if (empty) empty.remove();

    const div = document.createElement("div");
    div.className = "message assistant";
    div.innerHTML = `
      <div class="role-label">ARIA</div>
      <div class="thinking"><span></span><span></span><span></span></div>
    `;
    chat.appendChild(div);
    div.scrollIntoView({ behavior: "smooth" });
    return div;
  }

  async function toggleRecording() {
    if (!recording) {
      await startRecording();
    } else {
      stopRecording();
    }
  }

  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream);

      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(audioChunks, { type: "audio/webm" });
        await sendAudio(blob);
      };

      mediaRecorder.start();
      recording = true;
      micBtn.classList.add("recording");
      setStatus("Listening… tap again to stop", true);
    } catch (err) {
      setStatus("Microphone access denied");
      console.error(err);
    }
  }

  function stopRecording() {
    if (mediaRecorder && recording) {
      mediaRecorder.stop();
      recording = false;
      micBtn.classList.remove("recording");
      setStatus("Processing…", true);
    }
  }

  async function sendAudio(blob) {
    const formData = new FormData();
    formData.append("audio", blob, "recording.webm");

    const thinking = addThinking();

    try {
      const res = await fetch(`${API}/chat/voice?session_id=${sessionId}`, {
        method: "POST",
        body: formData,
      });

      if (!res.ok) throw new Error(await res.text());

      const userText = atob(res.headers.get("X-User-Text") || "") || "…";
      const assistantText = atob(res.headers.get("X-Assistant-Text") || "") || "…";

      thinking.remove();
      addMessage("user", userText);
      addMessage("assistant", assistantText);

      // Play audio response
      const audioBlob = await res.blob();
      const audioUrl = URL.createObjectURL(audioBlob);
      const audio = new Audio(audioUrl);
      setStatus("ARIA is speaking…", true);
      audio.onended = () => setStatus("Tap the mic to speak");
      audio.play();

    } catch (err) {
      thinking.remove();
      addMessage("assistant", "Sorry, something went wrong. Is the backend running?");
      setStatus("Error — check backend");
      console.error(err);
    }
  }

  async function sendText() {
    const input = document.getElementById("textInput");
    const text = input.value.trim();
    if (!text) return;
    input.value = "";
    addMessage("user", text);
    const thinking = addThinking();

    try {
      const res = await fetch(`${API}/chat/text?session_id=${sessionId}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text }),
      });
      const data = await res.json();
      thinking.remove();
      addMessage("assistant", data.assistant);
    } catch (err) {
      thinking.remove();
      addMessage("assistant", "Error connecting to backend.");
    }
  }

  async function clearSession() {
    await fetch(`${API}/session/${sessionId}`, { method: "DELETE" }).catch(() => {});
    chat.innerHTML = `<div class="empty-state"><div class="big">🎙️</div><p>Press the mic button to start talking.<br/>Type a message below if you prefer text.</p></div>`;
    setStatus("Chat cleared — tap the mic to speak");
  }
</script>
</body>
</html>
